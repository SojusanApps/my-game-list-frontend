<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Mantine primary colors (default blue scale approx) -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#339af0" /> <!-- primary-5 -->
      <stop offset="100%" stop-color="#1c7ed6" /> <!-- primary-7 -->
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="transparent" />

  <g transform="translate(256, 240)" text-anchor="middle">
    <!-- Big S -->
    <text
      y="30"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
      font-weight="800"
      font-style="italic"
      font-size="340"
      fill="url(#primaryGrad)">
      S
    </text>

    <!-- GL underneath -->
    <text
      y="210"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
      font-weight="800"
      font-size="160"
      fill="#334155"
      letter-spacing="5">
      GL
    </text>
  </g>
</svg>
